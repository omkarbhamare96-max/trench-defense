<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trench Defense - Prototype</title>
    <!-- Pulling Phaser 3 from an optimized CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.86.0/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #050b14;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        #game-container {
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.2);
            border: 2px solid #00ffc8;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
    // 1. Game Setup Configuration (Mobile/Desktop Friendly Vertical Layout)
    const config = {
        type: Phaser.AUTO,
        width: 450,
        height: 750,
        parent: 'game-container',
        backgroundColor: '#0a1526', // Deep sea dark mode
        physics: {
            default: 'arcade',
            arcade: { debug: false }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    const game = new Phaser.Game(config);

    // Global Game State
    let lightOrbs = 100;
    let lightText;
    let selectedCreature = 'seahorse'; // Default selection
    let cells = [];
    let bullets;
    let scavengers;

    function preload() {
        // We will generate art procedurally using code to avoid asset loading issues on GitHub!
    }

    function create() {
        const scene = this;
        bullets = scene.physics.add.group();
        scavengers = scene.physics.add.group();

        // 2. Draw the Mother Reef Area (Bottom Protection Zone)
        let reefBg = scene.add.graphics();
        reefBg.fillStyle(0x00ffc8, 0.15);
        reefBg.fillRect(0, 680, 450, 70);
        scene.add.text(225, 715, '⚓ MOTHER REEF ⚓', { fontSize: '18px', fill: '#00ffc8', fontWeight: 'bold' }).setOrigin(0.5);

        // 3. Draw the 5-Lane Grid System
        const startX = 45;
        const startY = 120;
        const cellWidth = 72;
        const cellHeight = 90;

        for (let row = 0; row < 6; row++) {
            for (let col = 0; col < 5; col++) {
                let x = startX + (col * cellWidth);
                let y = startY + (row * cellHeight);

                // Grid square shape
                let cellGraphic = scene.add.graphics();
                cellGraphic.lineStyle(1, 0x1d3557, 0.5);
                cellGraphic.strokeRect(x - cellWidth/2, y - cellHeight/2, cellWidth, cellHeight);

                // Interactive zone for placing defenders
                let hitZone = scene.add.zone(x, y, cellWidth, cellHeight).setInteractive();
                hitZone.setData('occupied', false);

                hitZone.on('pointerdown', () => {
                    if (!hitZone.getData('occupied') && lightOrbs >= 50) {
                        lightOrbs -= 50;
                        lightText.setText('✨ Light: ' + lightOrbs);
                        hitZone.setData('occupied', true);
                        
                        // Spawn simple placeholder shape for Sniper Seahorse
                        let defender = scene.add.circle(x, y, 20, 0x00b4d8);
                        scene.add.text(x, y, '🐴', { fontSize: '20px' }).setOrigin(0.5);

                        // Give it an idle "breathing" stretch using Phaser Tweens
                        scene.tweens.add({
                            targets: defender,
                            scaleY: 1.1,
                            scaleX: 0.95,
                            duration: 600 + Math.random() * 200,
                            yoyo: true,
                            repeat: -1,
                            ease: 'Sine.easeInOut'
                        });

                        // Shoot loop
                        scene.time.addEvent({
                            delay: 2000,
                            callback: () => {
                                if (scavengers.getLength() > 0) { // Only shoot if enemies exist
                                    let b = scene.physics.add.circle(x, y - 20, 6, 0x00f5ff);
                                    bullets.add(b);
                                    b.body.setVelocityY(-300); // Shoot upwards towards incoming enemies
                                }
                            },
                            loop: true
                        });
                    }
                });
            }
        }

        // 4. UI Resource Counter Dashboard
        lightText = scene.add.text(20, 20, '✨ Light: ' + lightOrbs, { fontSize: '22px', fill: '#fffb00', fontWeight: 'bold' });
        scene.add.text(20, 50, 'Click grid to place Seahorse (Cost: 50)', { fontSize: '12px', fill: '#8fa0ba' });

        // Natural Resource Generation (Dropping Light Orbs)
        scene.time.addEvent({
            delay: 4000,
            callback: () => {
                let rx = Phaser.Math.Between(40, 410);
                let ry = Phaser.Math.Between(100, 600);
                let orb = scene.add.circle(rx, ry, 15, 0xfffb00).setInteractive();
                
                scene.tweens.add({
                    targets: orb,
                    alpha: 0.5,
                    scale: 1.2,
                    duration: 800,
                    yoyo: true,
                    repeat: -1
                });

                orb.on('pointerdown', () => {
                    lightOrbs += 25;
                    lightText.setText('✨ Light: ' + lightOrbs);
                    orb.destroy();
                });
            },
            loop: true
        });

        // 5. Enemy Spawning Loop (Sludge Crabs creeping down from top)
        scene.time.addEvent({
            delay: 5000,
            callback: () => {
                let randomLane = Phaser.Math.Between(0, 4);
                let enemyX = startX + (randomLane * cellWidth);
                let enemy = scene.add.circle(enemyX, 50, 18, 0xe63946);
                scene.add.text(enemyX, 50, '🦀', { fontSize: '18px' }).setOrigin(0.5);
                
                scavengers.add(enemy);
                enemy.body.setVelocityY(35); // Slow movement down toward Mother Reef
            },
            loop: true
        });

        // Collisions: Bullets hitting Scavengers
        scene.physics.add.overlap(bullets, scavengers, (bullet, enemy) => {
            bullet.destroy();
            enemy.destroy(); // Simple one-hit defeat for prototype
        });
    }

    function update() {
        // Recycle off-screen bullets
        bullets.getChildren().forEach(b => {
            if (b.y < 0) b.destroy();
        });

        // Fail state condition check
        scavengers.getChildren().forEach(e => {
            if (e.y > 680) {
                alert('The Scavengers breached the Reef! Refresh to try again.');
                e.destroy();
                location.reload();
            }
        });
    }
</script>

</body>
</html>
