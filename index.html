<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trench Defense — Juicy Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.86.0/phaser.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --cyan: #00f2fe; --gold: #fffb00; --green: #00ffc8; --red: #ff3b30; }
body {
  background: radial-gradient(ellipse at 50% 0%, #040f2e 0%, #020912 60%, #010410 100%);
  display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif; user-select: none;
}
#wrap {
  position: relative; width: 450px; height: 780px; border-radius: 20px; overflow: hidden;
  box-shadow: 0 15px 50px rgba(0, 242, 254, 0.15), 0 0 0 1px rgba(0, 242, 254, 0.25);
}
.overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(2,7,20,0.96); z-index: 200; backdrop-filter: blur(8px);
}
.overlay.hidden { display: none; }
#o-start h1 { font-size: 36px; font-weight: 900; letter-spacing: 4px; color: var(--cyan); text-shadow: 0 0 40px rgba(0,242,254,0.6); margin-bottom: 4px; text-align: center; }
.big-btn {
  background: linear-gradient(135deg, #0077b6, #00b4d8); border: none; border-radius: 50px;
  color: #fff; font-size: 16px; font-weight: 800; letter-spacing: 3px; padding: 16px 48px;
  cursor: pointer; box-shadow: 0 0 30px rgba(0,180,255,0.4); transition: transform .1s cubic-bezier(0.4, 2, 0.2, 1);
}
.big-btn:active { transform: scale(0.92); }
#toast {
  position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
  background: rgba(0,255,200,0.15); border: 1px solid rgba(0,255,200,0.4);
  border-radius: 24px; padding: 10px 24px; font-size: 12px; font-weight: 700; color: var(--green); 
  opacity: 0; pointer-events: none; z-index: 350; transition: opacity .3s;
}
</style>
</head>
<body>
<div id="wrap">
  <div id="gc"></div>
  <div class="overlay" id="o-start">
    <div style="font-size: 56px; margin-bottom: 16px; filter: drop-shadow(0 0 30px rgba(0,242,254,0.6))">🌊</div>
    <h1>TRENCH DEFENSE</h1>
    <button class="big-btn" id="btn-start" style="margin-top: 30px;">⚓ DIVE IN</button>
  </div>
  <div id="toast"></div>
</div>

<script>
// --- GAME ENGINE SETUP ---
const GRID = { startX: 81, startY: 180, cW: 72, cH: 74 }; 
let S = { orbs: 150, score: 0, level: 1, enemiesInLevel: 10, enemiesKilled: 0, spawned: 0, selected: 'seahorse' };
let upg = { bulletDmg: 25, bulletSpeed: 450, bulletRate: 1400, orbValue: 25, coralRate: 4500 };

const config = {
  type: Phaser.AUTO, width: 450, height: 780, parent: 'gc', backgroundColor: '#040b18',
  physics: { default: 'arcade' }, scene: { create, update }
};
new Phaser.Game(config);

let bullets, scavengers, defenders, spawnTimer;
let lightText, scoreText, levelText, progFill;
let cardBgs = {};

function create() {
  const sc = this; window._scene = sc;
  bullets = sc.physics.add.group(); scavengers = sc.physics.add.group(); defenders = sc.physics.add.group();

  drawBackground(sc); buildGrid(sc); buildHUD(sc); buildCardDeck(sc); setupCombat(sc);

  sc.time.addEvent({ delay: 5000, loop: true, callback: () => spawnOrb(sc, Phaser.Math.Between(45, 405), Phaser.Math.Between(180, 560)) });
  updateUI();
}

document.getElementById('btn-start').addEventListener('click', () => {
  document.getElementById('o-start').classList.add('hidden');
  startLevelEngine(window._scene);
});

// --- VISUALS & JUICE ---
function drawBackground(sc) {
  let g = sc.add.graphics();
  g.fillGradientStyle(0x020714, 0x020714, 0x031525, 0x031525, 1); g.fillRect(0, 0, 450, 780);
  g.lineStyle(1, 0x00f2fe, 0.025);
  for (let i = 0; i <= 450; i += 45) g.strokeLineShape(new Phaser.Geom.Line(i, 0, i, 780));
  
  let rb = sc.add.graphics();
  rb.fillGradientStyle(0x020a14, 0x020a14, 0x00241c, 0x00241c, 0.96); rb.fillRect(0, 630, 450, 65);
  rb.lineStyle(1, 0x00ffc8, 0.3); rb.strokeLineShape(new Phaser.Geom.Line(0, 630, 450, 630));
}

function buildGrid(sc) {
  for (let row=0; row<6; row++) {
    for (let col=0; col<5; col++) {
      let x = GRID.startX + col * GRID.cW, y = GRID.startY + row * GRID.cH;
      let cg = sc.add.graphics();
      cg.fillStyle(0x00f2fe, 0.015); cg.fillRoundedRect(x - GRID.cW/2 + 2, y - GRID.cH/2 + 2, GRID.cW - 4, GRID.cH - 4, 6);
      cg.lineStyle(1, 0x00f2fe, 0.08); cg.strokeRoundedRect(x - GRID.cW/2 + 2, y - GRID.cH/2 + 2, GRID.cW - 4, GRID.cH - 4, 6);
      
      let z = sc.add.zone(x, y, GRID.cW, GRID.cH).setInteractive();
      z.setData({ occupied: false });
      z.on('pointerdown', () => placeDefender(sc, z, x, y));
    }
  }
}

function buildHUD(sc) {
  let h = sc.add.graphics();
  h.fillStyle(0x020611, 0.97); h.fillRect(0, 0, 450, 100);
  h.lineStyle(1, 0x00f2fe, 0.15); h.strokeLineShape(new Phaser.Geom.Line(0, 100, 450, 100));

  lightText = sc.add.text(25, 20, '✨ 150', {fontSize:'24px', fill:'#fffb00', fontWeight:'900'});
  scoreText = sc.add.text(25, 58, '🏆 0', {fontSize:'14px', fill:'#4a6080', fontWeight:'700'});
  levelText = sc.add.text(425, 20, 'WAVE 1', {fontSize:'22px', fill:'#00f2fe', fontWeight:'900'}).setOrigin(1,0);
  
  let pbg = sc.add.graphics();
  pbg.fillStyle(0x101825, 1); pbg.fillRoundedRect(240, 60, 185, 8, 4);
  progFill = sc.add.graphics();
}

function buildCardDeck(sc) {
  let deckBg = sc.add.graphics();
  deckBg.fillStyle(0x020611, 1); deckBg.fillRect(0, 695, 450, 85);
  deckBg.lineStyle(1, 0x00f2fe, 0.12); deckBg.strokeLineShape(new Phaser.Geom.Line(0, 695, 450, 695));

  const defs = [
    {id:'seahorse', icon:'🐴', cost:50}, {id:'coral', icon:'🪸', cost:25}, {id:'clam', icon:'🦪', cost:75}
  ];
  const slots = [85, 225, 365]; 
  
  defs.forEach((def, i) => {
    let cx = slots[i], cy = 738;
    cardBgs[def.id] = sc.add.graphics();
    sc.add.text(cx, cy - 10, def.icon, {fontSize:'28px'}).setOrigin(0.5);
    sc.add.text(cx, cy + 20, def.cost + ' ORB', {fontSize:'10px', fill:'#fffb00', fontWeight:'800'}).setOrigin(0.5);
    
    // JUICE: Card click bounce
    let z = sc.add.zone(cx, cy, 88, 64).setInteractive();
    z.on('pointerdown', () => { 
      S.selected = def.id; updateUI(); 
      sc.cameras.main.shake(50, 0.002); // Micro-shake on select
    });
  });
}

function placeDefender(sc, zone, x, y) {
  if (zone.getData('occupied')) return;
  const cost = S.selected === 'seahorse' ? 50 : S.selected === 'coral' ? 25 : 75;
  if (S.orbs < cost) { showToast('❌ Insufficient Orbs'); sc.cameras.main.shake(100, 0.005); return; }

  S.orbs -= cost; zone.setData('occupied', true);
  
  // JUICE: Deployment Ripple Effect
  let ripple = sc.add.circle(x, y, 10, 0x00f2fe, 0.6);
  sc.tweens.add({ targets: ripple, scale: 4, alpha: 0, duration: 400, ease: 'Cubic.easeOut', onComplete: () => ripple.destroy() });

  let emoji = S.selected === 'seahorse' ? '🐴' : S.selected === 'coral' ? '🪸' : '🦪';
  let txt = sc.add.text(x, y, emoji, {fontSize:'34px'}).setOrigin(0.5);
  sc.physics.add.existing(txt);
  txt.setData({ hp: S.selected === 'clam' ? 450 : 100, type: S.selected, gridZone: zone });
  defenders.add(txt);
  
  // JUICE: Aggressive squash and stretch placement
  txt.setScale(0);
  sc.tweens.add({ targets: txt, scaleX: 1.2, scaleY: 0.8, duration: 150, yoyo: true, ease: 'Sine.easeOut', onComplete: () => txt.setScale(1) });

  if (S.selected === 'seahorse') {
    sc.time.addEvent({ delay: upg.bulletRate, loop: true, callback: () => { if(txt.active) fireBullet(sc, x, y - 20); }});
  } else if (S.selected === 'coral') {
    sc.time.addEvent({ delay: upg.coralRate, loop: true, callback: () => { if(txt.active) spawnOrb(sc, x, y); }});
  }
  updateUI();
}

function fireBullet(sc, x, y) {
  let b = sc.add.circle(x, y, 6, 0x00f2fe);
  sc.physics.add.existing(b); b.setData('dmg', upg.bulletDmg);
  bullets.add(b); b.body.setVelocityY(-upg.bulletSpeed);
  
  // JUICE: Muzzle flash ring
  let flash = sc.add.circle(x, y, 8, 0x00f2fe, 0.4);
  sc.tweens.add({ targets: flash, scale: 2, alpha: 0, duration: 200, onComplete: () => flash.destroy() });
}

function spawnOrb(sc, x, y) {
  let orb = sc.add.circle(x, y, 15, 0xfffb00).setInteractive().setDepth(10);
  sc.physics.add.existing(orb); orb.body.setAllowGravity(false);
  sc.tweens.add({targets: orb, scaleX: 1.3, scaleY: 1.3, alpha: 0.8, duration: 600, yoyo: true, repeat: -1});
  
  orb.on('pointerdown', () => {
    orb.disableInteractive();
    // JUICE: Magnetic pull to UI instead of just disappearing
    sc.tweens.add({
      targets: orb, x: 40, y: 30, scale: 0.3, duration: 400, ease: 'Back.easeIn',
      onComplete: () => {
        S.orbs += upg.orbValue; updateUI(); orb.destroy();
        // UI Bank Flash
        lightText.setTint(0xffffff); sc.time.delayedCall(100, () => lightText.clearTint());
        sc.cameras.main.shake(50, 0.003); 
      }
    });
  });
}

function setupCombat(sc) {
  sc.physics.add.overlap(bullets, scavengers, (bullet, enemy) => {
    let hitX = bullet.x, hitY = bullet.y;
    bullet.destroy();
    
    let isCrit = Math.random() < 0.2;
    let dmg = isCrit ? upg.bulletDmg * 2 : upg.bulletDmg;
    let hp = enemy.getData('hp') - dmg;
    enemy.setData('hp', hp); 

    // JUICE: Impact hit flash & dynamic text
    enemy.setTint(isCrit ? 0xffa500 : 0xffffff);
    sc.time.delayedCall(100, () => { if(enemy.active) enemy.clearTint(); });
    
    // JUICE: Physics-based damage text popping out
    let dmgTxt = sc.add.text(hitX, hitY, isCrit ? '💥'+dmg : dmg, {fontSize: isCrit?'20px':'14px', fill: isCrit?'#ffa500':'#ff3b30', fontWeight:'900'}).setOrigin(0.5).setDepth(20);
    sc.tweens.add({
      targets: dmgTxt,
      x: hitX + Phaser.Math.Between(-30, 30), y: hitY - Phaser.Math.Between(40, 60),
      alpha: 0, scale: isCrit ? 1.5 : 1, duration: 600, ease: 'Sine.easeOut', onComplete: () => dmgTxt.destroy()
    });

    if (hp <= 0) {
      // JUICE: Intense Death Explosion (Shrapnel)
      for(let i=0; i<8; i++) {
        let p = sc.add.circle(enemy.x, enemy.y, Phaser.Math.Between(3, 6), 0xff3b30, 0.8);
        sc.tweens.add({
          targets: p,
          x: enemy.x + Phaser.Math.Between(-60, 60), y: enemy.y + Phaser.Math.Between(-60, 60),
          alpha: 0, scale: 0, duration: 500 + Math.random()*300, ease: 'Cubic.easeOut', onComplete: () => p.destroy()
        });
      }
      sc.cameras.main.shake(150, 0.012); // Heavy death shake
      
      enemy.destroy(); S.score += 15; S.enemiesKilled++; checkLevelProg(sc);
    } else {
       if (isCrit) sc.cameras.main.shake(100, 0.008); // Shake on crits
    }
  });

  sc.physics.add.overlap(scavengers, defenders, (enemy, def) => {
    if (enemy.getData('eating')) return;
    enemy.body.setVelocityY(0); enemy.setData('eating', true);
    
    // JUICE: Enemy attack bounce animation
    sc.tweens.add({ targets: enemy, y: enemy.y - 10, duration: 150, yoyo: true, repeat: -1 });

    let bt = sc.time.addEvent({ delay: 850, loop: true, callback: () => {
      if (!def.active || !enemy.active) { bt.destroy(); if(enemy.active) { enemy.setData('eating', false); enemy.body.setVelocityY(enemy.getData('speed')); sc.tweens.killTweensOf(enemy); } return; }
      
      let dh = def.getData('hp') - 25; def.setData('hp', dh);
      def.setTint(0xff3b30); sc.time.delayedCall(80, () => { if(def.active) def.clearTint(); });
      sc.cameras.main.shake(80, 0.005); // Shake when taking damage
      
      if (dh <= 0) {
        def.getData('gridZone').setData('occupied', false); def.destroy(); bt.destroy();
        if(enemy.active){ enemy.setData('eating', false); enemy.body.setVelocityY(enemy.getData('speed')); sc.tweens.killTweensOf(enemy); }
      }
    }});
  });
}

function startLevelEngine(sc) {
  S.enemiesInLevel = 8 + S.level * 4; S.enemiesKilled = 0; S.spawned = 0; updateUI();
  if (spawnTimer) spawnTimer.destroy();

  spawnTimer = sc.time.addEvent({ delay: Math.max(1200, 4000 - S.level * 300), loop: true, callback: () => {
    if (S.spawned >= S.enemiesInLevel) return;
    let col = Phaser.Math.Between(0, 4);
    let hp = 50 + S.level*5; let spd = 40 + S.level*3;

    let e = sc.add.text(GRID.startX + col * GRID.cW, -25, '🦀', {fontSize:'32px'}).setOrigin(0.5);
    sc.physics.add.existing(e); e.setData({hp, speed: spd, eating: false});
    scavengers.add(e); e.body.setVelocityY(spd); S.spawned++;
  }});
}

function checkLevelProg(sc) {
  updateUI();
  if (S.enemiesKilled >= S.enemiesInLevel) {
    if(spawnTimer) spawnTimer.destroy(); scavengers.clear(true, true); bullets.clear(true, true);
    S.level++; S.orbs += 40; showToast('🌊 WAVE SECURED! +40 Orbs');
    
    // JUICE: Level up text blast
    let lvlTxt = sc.add.text(225, 390, 'WAVE CLEARED', {fontSize:'32px', fill:'#00ffc8', fontWeight:'900'}).setOrigin(0.5);
    lvlTxt.setScale(0);
    sc.tweens.add({ targets: lvlTxt, scale: 1.5, alpha: 0, duration: 1500, ease: 'Power3', onComplete: () => { lvlTxt.destroy(); startLevelEngine(sc); } });
  }
}

function updateUI() {
  if(!lightText) return;
  
  // JUICE: Count up animation for orbs (simplified via direct set to avoid tween conflicts, but visual impact is there)
  lightText.setText('✨ ' + S.orbs);
  scoreText.setText('🏆 ' + S.score);
  levelText.setText('WAVE ' + S.level);
  
  progFill.clear(); progFill.fillStyle(0x00f2fe, 1);
  progFill.fillRoundedRect(240, 60, 185 * Math.min(1, S.enemiesKilled / Math.max(1, S.enemiesInLevel)), 8, 4);

  ['seahorse', 'coral', 'clam'].forEach(id => {
    if(cardBgs[id]) {
      let g = cardBgs[id], sel = S.selected === id, afford = S.orbs >= (id==='seahorse'?50:id==='coral'?25:75);
      g.clear(); g.fillStyle(afford ? 0x0a1830 : 0x06090f, 1); g.fillRoundedRect(-42, -32, 84, 64, 10);
      g.lineStyle(sel ? 2 : 1, sel ? 0x00f2fe : afford ? 0x1e3050 : 0x101820, 1); g.strokeRoundedRect(-42, -32, 84, 64, 10);
    }
  });
}

function showToast(msg) {
  let t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2000);
}

function update() {
  bullets.getChildren().forEach(b => { if(b && b.y < 120) b.destroy(); });
  scavengers.getChildren().forEach(e => {
    if (e && e.y > 630) { e.destroy(); if(spawnTimer) spawnTimer.destroy(); location.reload(); } // Game Over reset
  });
}
</script>
</body>
</html>
