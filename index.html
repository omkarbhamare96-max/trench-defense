<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trench Defense - Live Build</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.86.0/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #020610;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }
        #game-container {
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.25);
            border: 1px solid rgba(0, 242, 254, 0.4);
            border-radius: 16px;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 450,
        height: 780,
        parent: 'game-container',
        backgroundColor: '#030914',
        physics: {
            default: 'arcade',
            arcade: { debug: false }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    const game = new Phaser.Game(config);

    // Gameplay States
    let lightOrbs = 150;
    let score = 0;
    let currentLevel = 1;
    let enemiesDefeatedInLevel = 0;
    let totalEnemiesInLevel = 10;
    let currentSelection = 'seahorse';

    // UI elements
    let lightText, scoreText, levelText;
    let progressBarFill;
    let bg1, bg2, bg3; // Card background boxes

    // Logic Groups
    let bullets, scavengers, defenders;
    let spawnTimer;

    function preload() {}

    function create() {
        const scene = this;

        bullets = scene.physics.add.group();
        scavengers = scene.physics.add.group();
        defenders = scene.physics.add.group();

        // 1. ESTABLISH SCI-FI BIOLUMINESCENT BACKGROUND
        // Layered deep ocean gradient
        let deepBg = scene.add.graphics();
        deepBg.fillGradientStyle(0x020713, 0x020713, 0x05172b, 0x05172b, 1);
        deepBg.fillRect(0, 0, 450, 780);

        // Ambient trench sonar lines for technological look
        deepBg.lineStyle(1, 0x00f2fe, 0.04);
        for(let i = 0; i < 450; i += 40) {
            deepBg.strokeLineShape(new Phaser.Geom.Line(i, 0, i, 780));
        }

        // 2. MOTHER REEF COATED SAFETY RADAR
        let reefBg = scene.add.graphics();
        reefBg.fillGradientStyle(0x000000, 0x000000, 0x002e26, 0x002e26, 0.8);
        reefBg.fillRect(0, 640, 450, 60);
        reefBg.lineStyle(2, 0x00ffc8, 0.3);
        reefBg.strokeLineShape(new Phaser.Geom.Line(0, 640, 450, 640));
        scene.add.text(225, 670, '🛡️ MOTHER REEF SHIELD ACTIVE 🛡️', { fontSize: '13px', fill: '#00ffc8', fontWeight: 'bold', letterSpacing: 3 }).setOrigin(0.5);

        // 3. TACTICAL GRID GENERATION
        const startX = 45;
        const startY = 160;
        const cellWidth = 72;
        const cellHeight = 76;

        for (let row = 0; row < 6; row++) {
            for (let col = 0; col < 5; col++) {
                let x = startX + (col * cellWidth);
                let y = startY + (row * cellHeight);

                let cellGraphic = scene.add.graphics();
                // Subtle glowing grid squares
                cellGraphic.fillStyle(0x00f2fe, 0.015);
                cellGraphic.fillRect(x - cellWidth/2 + 2, y - cellHeight/2 + 2, cellWidth - 4, cellHeight - 4);
                cellGraphic.lineStyle(1, 0x00f2fe, 0.08);
                cellGraphic.strokeRect(x - cellWidth/2 + 2, y - cellHeight/2 + 2, cellWidth - 4, cellHeight - 4);

                let hitZone = scene.add.zone(x, y, cellWidth, cellHeight).setInteractive();
                hitZone.setData('occupied', false);

                hitZone.on('pointerdown', () => {
                    if (hitZone.getData('occupied')) return;

                    let cost = currentSelection === 'seahorse' ? 50 : currentSelection === 'coral' ? 25 : 75;
                    
                    if (lightOrbs >= cost) {
                        lightOrbs -= cost;
                        hitZone.setData('occupied', true);
                        
                        let emoji = '🐴';
                        let hp = 100;
                        if (currentSelection === 'coral') { emoji = '🪸'; hp = 60; }
                        if (currentSelection === 'clam') { emoji = '🦪'; hp = 450; }

                        let defText = scene.add.text(x, y, emoji, { fontSize: '34px' }).setOrigin(0.5);
                        scene.physics.add.existing(defText);
                        defText.setData('hp', hp);
                        defText.setData('type', currentSelection);
                        defText.setData('gridZone', hitZone);
                        defenders.add(defText);

                        defText.setScale(0);
                        scene.tweens.add({
                            targets: defText,
                            scaleX: 1, scaleY: 1,
                            duration: 250,
                            ease: 'Back.easeOut'
                        });

                        if (currentSelection === 'seahorse') {
                            scene.time.addEvent({
                                delay: 1400,
                                callback: () => {
                                    if (!defText.active) return;
                                    let b = scene.add.circle(x, y - 20, 6, 0x00f2fe);
                                    bullets.add(b);
                                    b.body.setVelocityY(-380);
                                },
                                loop: true
                            });
                        } else if (currentSelection === 'coral') {
                            scene.time.addEvent({
                                delay: 4500,
                                callback: () => {
                                    if (!defText.active) return;
                                    spawnOrb(scene, x + Phaser.Math.Between(-15, 15), y + Phaser.Math.Between(-15, 15));
                                },
                                loop: true
                            });
                        }
                    }
                });
            }
        }

        // 4. HEADER CONTROL HUD PLATFORM
        let hudBg = scene.add.graphics();
        hudBg.fillStyle(0x01040a, 0.9);
        hudBg.fillRect(0, 0, 450, 105);
        hudBg.lineStyle(1, 0x00f2fe, 0.2);
        hudBg.strokeLineShape(new Phaser.Geom.Line(0, 105, 450, 105));

        lightText = scene.add.text(25, 20, '✨ Light: ' + lightOrbs, { fontSize: '20px', fill: '#fffb00', fontWeight: 'bold' });
        scoreText = scene.add.text(25, 52, '🏆 Score: ' + score, { fontSize: '14px', fill: '#a0aec0' });
        levelText = scene.add.text(425, 20, 'LEVEL ' + currentLevel, { fontSize: '20px', fill: '#00f2fe', fontWeight: 'bold' }).setOrigin(1, 0);

        // Level Progression Progress Bar Graphic
        scene.add.text(240, 55, 'Wave Progress', { fontSize: '11px', fill: '#718096' });
        let progressBarBg = scene.add.graphics();
        progressBarBg.fillStyle(0x1a202c, 1);
        progressBarBg.fillRoundedRect(240, 70, 185, 8, 4);
        progressBarFill = scene.add.graphics();

        // 5. MODERN COMMAND CARDS DECK LAYOUT
        let deckBg = scene.add.graphics();
        deckBg.fillStyle(0x020610, 1);
        deckBg.fillRect(0, 700, 450, 80);
        deckBg.lineStyle(1, 0x00f2fe, 0.15);
        deckBg.strokeLineShape(new Phaser.Geom.Line(0, 700, 450, 700));

        // Card 1: Seahorse
        cardSeahorse = scene.add.container(90, 740);
        bg1 = scene.add.rectangle(0, 0, 80, 62, 0x091424).setStrokeStyle(2, 0x00f2fe).setInteractive();
        cardSeahorse.add([bg1, scene.add.text(0, -11, '🐴', { fontSize: '24px' }).setOrigin(0.5), scene.add.text(0, 15, '50 LGT', { fontSize: '11px', fill: '#fffb00', fontWeight: 'bold' }).setOrigin(0.5)]);
        bg1.on('pointerdown', () => selectCard('seahorse'));

        // Card 2: Coral
        cardCoral = scene.add.container(225, 740);
        bg2 = scene.add.rectangle(0, 0, 80, 62, 0x091424).setStrokeStyle(1, 0x1a2a40).setInteractive();
        cardCoral.add([bg2, scene.add.text(0, -11, '🪸', { fontSize: '24px' }).setOrigin(0.5), scene.add.text(0, 15, '25 LGT', { fontSize: '11px', fill: '#fffb00', fontWeight: 'bold' }).setOrigin(0.5)]);
        bg2.on('pointerdown', () => selectCard('coral'));

        // Card 3: Clam
        cardClam = scene.add.container(360, 740);
        bg3 = scene.add.rectangle(0, 0, 80, 62, 0x091424).setStrokeStyle(1, 0x1a2a40).setInteractive();
        cardClam.add([bg3, scene.add.text(0, -11, '🦪', { fontSize: '24px' }).setOrigin(0.5), scene.add.text(0, 15, '75 LGT', { fontSize: '11px', fill: '#fffb00', fontWeight: 'bold' }).setOrigin(0.5)]);
        bg3.on('pointerdown', () => selectCard('clam'));

        function selectCard(type) {
            currentSelection = type;
            bg1.setStrokeStyle(type === 'seahorse' ? 2 : 1, type === 'seahorse' ? 0x00f2fe : 0x1a2a40);
            bg2.setStrokeStyle(type === 'coral' ? 2 : 1, type === 'coral' ? 0x00f2fe : 0x1a2a40);
            bg3.setStrokeStyle(type === 'clam' ? 2 : 1, type === 'clam' ? 0x00f2fe : 0x1a2a40);
        }

        // Ambient Resource Spawns
        scene.time.addEvent({
            delay: 4500,
            callback: () => spawnOrb(scene, Phaser.Math.Between(40, 410), Phaser.Math.Between(150, 550)),
            loop: true
        });

        // Initialize Wave Engine Loop
        startLevelEngine(scene);

        // Core Collision Handler
        scene.physics.add.overlap(bullets, scavengers, (bullet, enemy) => {
            bullet.destroy();
            let currentHp = enemy.getData('hp') - 25;
            enemy.setData('hp', currentHp);

            enemy.setTint(0xff3b30);
            scene.time.delayedCall(80, () => { if(enemy.active) enemy.clearTint(); });

            if (currentHp <= 0) {
                enemy.destroy();
                score += 15;
                enemiesDefeatedInLevel++;
                updateUISlice();

                // Check Level Win Status
                if (enemiesDefeatedInLevel >= totalEnemiesInLevel) {
                    advanceNextLevel(scene);
                }
            }
        });

        // Eating Combat Collisions
        scene.physics.add.overlap(scavengers, defenders, (enemy, defender) => {
            enemy.body.setVelocityY(0);
            if (!enemy.getData('eating')) {
                enemy.setData('eating', true);
                let biteTimer = scene.time.addEvent({
                    delay: 800,
                    callback: () => {
                        if (!defender.active || !enemy.active) {
                            biteTimer.destroy();
                            if(enemy.active) {
                                enemy.setData('eating', false);
                                enemy.body.setVelocityY(enemy.getData('speed'));
                            }
                            return;
                        }
                        let defHp = defender.getData('hp') - 20;
                        defender.setData('hp', defHp);
                        if (defHp <= 0) {
                            defender.getData('gridZone').setData('occupied', false);
                            defender.destroy();
                            biteTimer.destroy();
                            if (enemy.active) {
                                enemy.setData('eating', false);
                                enemy.body.setVelocityY(enemy.getData('speed'));
                            }
                        }
                    },
                    loop: true
                });
            }
        });
    }

    // LEVEL LOGIC MANAGERS
    function startLevelEngine(scene) {
        totalEnemiesInLevel = 8 + (currentLevel * 4); // Each level gets progressively longer
        enemiesDefeatedInLevel = 0;
        updateUISlice();

        let spawnDelay = Math.max(1500, 4500 - (currentLevel * 400)); // Level up makes enemies spawn faster!

        if (spawnTimer) spawnTimer.destroy();

        let spawnedCount = 0;
        spawnTimer = scene.time.addEvent({
            delay: spawnDelay,
            callback: () => {
                if (spawnedCount >= totalEnemiesInLevel) return;

                let lane = Phaser.Math.Between(0, 4);
                let enemyX = 45 + (lane * 72);
                
                let isHard = Math.random() < (0.15 + (currentLevel * 0.05)); // Harder enemies appear more frequently as level increases
                let enemyEmoji = isHard ? '📦' : '🦀';
                let enemyHp = isHard ? 120 : 50;
                let speed = (isHard ? 28 : 42) + (currentLevel * 3); // Enemies accelerate each level

                let enemy = scene.add.text(enemyX, -20, enemyEmoji, { fontSize: '30px' }).setOrigin(0.5);
                scene.physics.add.existing(enemy);
                enemy.setData('hp', enemyHp);
                enemy.setData('speed', speed);
                scavengers.add(enemy);
                enemy.body.setVelocityY(speed);

                spawnedCount++;
            },
            loop: true
        });
    }

    function advanceNextLevel(scene) {
        spawnTimer.destroy();
        // Clear lingering bullets or remaining stray units safely
        scavengers.clear(true, true);
        bullets.clear(true, true);

        currentLevel++;
        
        let winText = scene.add.text(225, 390, 'LEVEL COMPLETED!\nTrench Secured.', { fontSize: '28px', fill: '#00ffc8', align: 'center', fontWeight: 'bold' }).setOrigin(0.5);
        
        scene.time.delayedCall(2500, () => {
            winText.destroy();
            startLevelEngine(scene);
        });
    }

    function spawnOrb(scene, x, y) {
        let orb = scene.add.circle(x, y, 15, 0xfffb00).setInteractive();
        scene.physics.add.existing(orb);
        orb.body.setAllowGravity(false);

        scene.tweens.add({
            targets: orb,
            alpha: 0.3, scale: 1.25,
            duration: 800, yoyo: true, repeat: -1
        });

        orb.on('pointerdown', () => {
            lightOrbs += 25;
            updateUISlice();
            orb.destroy();
        });
    }

    function updateUISlice() {
        lightText.setText('✨ Light: ' + lightOrbs);
        scoreText.setText('🏆 Score: ' + score);
        levelText.setText('LEVEL ' + currentLevel);

        // Update Level progress slider
        progressBarFill.clear();
        progressBarFill.fillStyle(0x00f2fe, 1);
        let ratio = Math.min(1, enemiesDefeatedInLevel / totalEnemiesInLevel);
        progressBarFill.fillRoundedRect(240, 70, 185 * ratio, 8, 4);

        // Highlight card edges conditionally if player can afford them
        if(bg1) bg1.setFillStyle(lightOrbs >= 50 ? '#0d223a' : '#091424');
        if(bg2) bg2.setFillStyle(lightOrbs >= 25 ? '#0d223a' : '#091424');
        if(bg3) bg3.setFillStyle(lightOrbs >= 75 ? '#0d223a' : '#091424');
    }

    function update() {
        bullets.getChildren().forEach(b => {
            if (b && b.y < 110) b.destroy();
        });

        scavengers.getChildren().forEach(e => {
            if (e && e.y > 640) {
                e.destroy();
                alert('Trench Overrun! Defeat at Level ' + currentLevel + '. Final Score: ' + score);
                location.reload();
            }
        });
    }
</script>

</body>
</html>
