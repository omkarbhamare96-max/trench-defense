<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trench Defense — Deep Ocean Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.86.0/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 50% 0%, #040f2a 0%, #020714 60%, #010410 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            user-select: none;
        }
        #game-container {
            box-shadow: 0 0 80px rgba(0, 180, 255, 0.15), 0 0 30px rgba(0, 255, 200, 0.08);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 18px;
            overflow: hidden;
            position: relative;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(2, 7, 20, 0.92);
            z-index: 100;
            border-radius: 18px;
            backdrop-filter: blur(4px);
        }
        #overlay h1 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #00f2fe;
            text-shadow: 0 0 30px rgba(0, 242, 254, 0.6);
            margin-bottom: 8px;
        }
        #overlay .sub {
            font-size: 12px;
            color: #4a90d9;
            letter-spacing: 6px;
            font-weight: 600;
            margin-bottom: 40px;
        }
        #overlay .score-line {
            font-size: 14px;
            color: #a0b4cc;
            margin-bottom: 6px;
        }
        #overlay .hs-line {
            font-size: 18px;
            font-weight: 700;
            color: #fffb00;
            margin-bottom: 40px;
            text-shadow: 0 0 15px rgba(255, 251, 0, 0.4);
        }
        #start-btn {
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 3px;
            padding: 16px 48px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 180, 255, 0.4);
            transition: all 0.2s;
        }
        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 180, 255, 0.6);
        }
        #upgrade-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(2, 7, 20, 0.95);
            z-index: 100;
            border-radius: 18px;
            backdrop-filter: blur(6px);
        }
        #upgrade-overlay h2 {
            font-size: 22px;
            font-weight: 900;
            color: #00ffc8;
            letter-spacing: 3px;
            margin-bottom: 4px;
        }
        #upgrade-overlay .wave-complete {
            font-size: 11px;
            color: #4a90d9;
            letter-spacing: 4px;
            margin-bottom: 28px;
        }
        .upgrade-cards {
            display: flex;
            gap: 14px;
            margin-bottom: 28px;
        }
        .upg-card {
            background: rgba(10, 22, 40, 0.9);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 14px;
            padding: 18px 16px;
            width: 115px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upg-card:hover {
            border-color: rgba(0, 242, 254, 0.8);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            transform: translateY(-4px);
        }
        .upg-card .upg-icon { font-size: 28px; margin-bottom: 8px; }
        .upg-card .upg-name { font-size: 10px; font-weight: 700; color: #00f2fe; letter-spacing: 1px; margin-bottom: 4px; }
        .upg-card .upg-desc { font-size: 9px; color: #6a8aaa; line-height: 1.4; margin-bottom: 8px; }
        .upg-card .upg-cost { font-size: 11px; font-weight: 800; color: #fffb00; }
        .upg-card.free .upg-cost { color: #00ffc8; }
        #skip-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            color: #4a6080;
            font-size: 11px;
            letter-spacing: 2px;
            padding: 8px 28px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #skip-btn:hover { color: #a0b4cc; border-color: rgba(255,255,255,0.3); }
        .orbs-display {
            font-size: 13px;
            color: #fffb00;
            font-weight: 700;
            margin-bottom: 20px;
        }
        #combo-flash {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
            color: #ff6b35;
            letter-spacing: 3px;
            pointer-events: none;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.1s;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.8);
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div id="game-container">
    <div id="overlay">
        <h1>TRENCH DEFENSE</h1>
        <div class="sub">DEEP OCEAN EDITION</div>
        <div class="score-line" id="last-score-line" style="display:none">Last Run</div>
        <div class="hs-line" id="hs-display"></div>
        <button id="start-btn">DIVE IN</button>
    </div>
    <div id="upgrade-overlay">
        <h2>WAVE SECURED</h2>
        <div class="wave-complete" id="wave-label">LEVEL 1 COMPLETE</div>
        <div class="orbs-display" id="orbs-display">✨ 150 Light Orbs</div>
        <div class="upgrade-cards" id="upgrade-cards"></div>
        <button id="skip-btn">SKIP UPGRADES → DIVE DEEPER</button>
    </div>
    <div id="combo-flash"></div>
</div>

<script>
// ──────────────────────────────────────────────
//  GLOBAL STATE
// ──────────────────────────────────────────────
let lightOrbs = 150;
let score = 0;
let highScore = parseInt(localStorage.getItem('td_hs') || '0');
let currentLevel = 1;
let enemiesDefeatedInLevel = 0;
let totalEnemiesInLevel = 10;
let currentSelection = 'seahorse';
let killStreak = 0;
let comboTimer = null;
let depthCharges = 2;
let upgradesPurchased = {};

// Upgrade multipliers
let upgrades = {
    bulletDmg: 25,
    bulletSpeed: 380,
    bulletRate: 1400,
    orbValue: 25,
    coralRate: 4500,
    clamHp: 450,
};

// ──────────────────────────────────────────────
//  OVERLAY LOGIC (outside Phaser)
// ──────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const upgradeOverlay = document.getElementById('upgrade-overlay');
const comboFlash = document.getElementById('combo-flash');

function showStartScreen() {
    overlay.style.display = 'flex';
    const hsEl = document.getElementById('hs-display');
    if (highScore > 0) {
        document.getElementById('last-score-line').style.display = 'block';
        hsEl.textContent = '🏆 Best: ' + highScore;
    } else {
        hsEl.textContent = 'Protect the Mother Reef!';
        hsEl.style.color = '#a0b4cc';
        hsEl.style.fontSize = '13px';
    }
}

document.getElementById('start-btn').addEventListener('click', () => {
    overlay.style.display = 'none';
    window._gameStarted = true;
    if (window._phaserScene) startLevelEngine(window._phaserScene);
});

function showCombo(x, mult) {
    const msgs = {2:'DOUBLE!',3:'TRIPLE!',4:'QUAD!!',5:'PENTA!!!',6:'UNSTOPPABLE!!!',7:'GODLIKE!!!!!'};
    const msg = msgs[Math.min(mult, 7)] || (mult + 'x COMBO!!!!');
    comboFlash.textContent = msg;
    comboFlash.style.opacity = '1';
    setTimeout(() => { comboFlash.style.opacity = '0'; }, 800);
}

function showUpgradeScreen(scene) {
    upgradeOverlay.style.display = 'flex';
    document.getElementById('wave-label').textContent = 'LEVEL ' + (currentLevel - 1) + ' COMPLETE';
    document.getElementById('orbs-display').textContent = '✨ ' + lightOrbs + ' Light Orbs';

    const cards = document.getElementById('upgrade-cards');
    cards.innerHTML = '';

    const allUpgrades = [
        { id:'dmg', icon:'⚡', name:'PLASMA ROUNDS', desc:'Bullet damage +50%', cost:30, apply: () => { upgrades.bulletDmg = Math.round(upgrades.bulletDmg * 1.5); } },
        { id:'rate', icon:'🔫', name:'RAPID FIRE', desc:'Fire rate +30% faster', cost:40, apply: () => { upgrades.bulletRate = Math.round(upgrades.bulletRate * 0.7); } },
        { id:'speed', icon:'💨', name:'VELOCITY BOOST', desc:'Bullet speed +40%', cost:25, apply: () => { upgrades.bulletSpeed = Math.round(upgrades.bulletSpeed * 1.4); } },
        { id:'orb', icon:'✨', name:'ORB MAGNET', desc:'Collect +10 orbs per pickup', cost:20, apply: () => { upgrades.orbValue += 10; } },
        { id:'coral', icon:'🪸', name:'CORAL BLOOM', desc:'Coral spawns orbs 30% faster', cost:35, apply: () => { upgrades.coralRate = Math.round(upgrades.coralRate * 0.7); } },
        { id:'clam', icon:'🦪', name:'TITAN SHELL', desc:'Clam HP +100', cost:50, apply: () => { upgrades.clamHp += 100; } },
        { id:'charge', icon:'💥', name:'DEPTH CHARGE', desc:'+1 Depth Charge (nuke a lane)', cost:0, apply: () => { depthCharges++; updateUI_global(scene); } },
        { id:'orbs25', icon:'💰', name:'ORB CACHE', desc:'Instantly +50 orbs', cost:0, apply: () => { lightOrbs += 50; updateUI_global(scene); } },
    ];

    // Pick 3 random non-repeated upgrades
    const shuffled = allUpgrades.sort(() => Math.random() - 0.5).slice(0, 3);

    shuffled.forEach(upg => {
        const card = document.createElement('div');
        card.className = 'upg-card' + (upg.cost === 0 ? ' free' : '');
        card.innerHTML = `
            <div class="upg-icon">${upg.icon}</div>
            <div class="upg-name">${upg.name}</div>
            <div class="upg-desc">${upg.desc}</div>
            <div class="upg-cost">${upg.cost === 0 ? 'FREE' : upg.cost + ' ORBs'}</div>
        `;
        card.addEventListener('click', () => {
            if (upg.cost > 0 && lightOrbs < upg.cost) {
                card.style.borderColor = 'rgba(255,60,60,0.6)';
                setTimeout(() => card.style.borderColor = '', 400);
                return;
            }
            lightOrbs -= upg.cost;
            upg.apply();
            upgradeOverlay.style.display = 'none';
            startLevelEngine(scene);
            updateUI_global(scene);
        });
        cards.appendChild(card);
    });

    document.getElementById('skip-btn').onclick = () => {
        upgradeOverlay.style.display = 'none';
        startLevelEngine(scene);
    };
}

// ──────────────────────────────────────────────
//  PHASER CONFIG
// ──────────────────────────────────────────────
const config = {
    type: Phaser.AUTO,
    width: 450,
    height: 780,
    parent: 'game-container',
    backgroundColor: '#040b18',
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload, create, update }
};
const game = new Phaser.Game(config);

// ──────────────────────────────────────────────
//  PHASER VARS
// ──────────────────────────────────────────────
let lightText, scoreText, levelText, waveProgressText, chargeText;
let progressBarFill, progressBarBg;
let bullets, scavengers, defenders, particles;
let spawnTimer;
let bg1, bg2, bg3;
let cardSeahorse, cardCoral, cardClam;
let bubbles = [];
let bossActive = false;
let bossBar, bossBarBg, bossLabel;
let defenderTimers = [];
let spawnedCount = 0;
let gamePaused = false;
let laneCharges = [false, false, false, false, false];
let floatingOrbPool = [];

function preload() {}

function create() {
    const scene = this;
    window._phaserScene = scene;

    bullets    = scene.physics.add.group();
    scavengers = scene.physics.add.group();
    defenders  = scene.physics.add.group();

    buildBackground(scene);
    buildGrid(scene);
    buildHUD(scene);
    buildCardDeck(scene);
    buildDepthChargeButton(scene);
    buildAmbientBubbles(scene);
    setupCombat(scene);
    buildBossBar(scene);

    // Ambient orb spawner
    scene.time.addEvent({
        delay: 5000,
        callback: () => {
            if (!window._gameStarted || gamePaused) return;
            spawnOrb(scene, Phaser.Math.Between(40, 410), Phaser.Math.Between(160, 550));
        },
        loop: true
    });

    showStartScreen();
    updateUI_global(scene);
}

// ──────────────────────────────────────────────
//  BACKGROUND
// ──────────────────────────────────────────────
function buildBackground(scene) {
    let g = scene.add.graphics();
    g.fillGradientStyle(0x020714, 0x020714, 0x031525, 0x031525, 1);
    g.fillRect(0, 0, 450, 780);

    // Scan lines
    g.lineStyle(1, 0x00f2fe, 0.025);
    for (let i = 0; i <= 450; i += 45) g.strokeLineShape(new Phaser.Geom.Line(i, 0, i, 780));

    // Reef floor glow
    let floorGlow = scene.add.graphics();
    floorGlow.fillGradientStyle(0x00ffc8, 0x00ffc8, 0x031525, 0x031525, 0, 0, 0.08, 0.08);
    floorGlow.fillRect(0, 600, 450, 30);

    // Reef guard banner
    let reefBg = scene.add.graphics();
    reefBg.fillGradientStyle(0x020a14, 0x020a14, 0x001f18, 0x001f18, 0.95);
    reefBg.fillRect(0, 628, 450, 62);
    reefBg.lineStyle(1, 0x00ffc8, 0.3);
    reefBg.strokeLineShape(new Phaser.Geom.Line(0, 628, 450, 628));
    scene.add.text(225, 659, '🛡️  MOTHER REEF SHIELD ACTIVE', {
        fontSize: '11px', fill: '#00ffc8', fontWeight: '700', letterSpacing: 2
    }).setOrigin(0.5);
}

// ──────────────────────────────────────────────
//  AMBIENT BUBBLES
// ──────────────────────────────────────────────
function buildAmbientBubbles(scene) {
    for (let i = 0; i < 18; i++) {
        let bx = Phaser.Math.Between(10, 440);
        let by = Phaser.Math.Between(130, 650);
        let r  = Phaser.Math.Between(2, 6);
        let b  = scene.add.circle(bx, by, r, 0x00f2fe, 0.12 + Math.random() * 0.1);
        scene.tweens.add({
            targets: b,
            y: by - Phaser.Math.Between(60, 160),
            alpha: 0,
            duration: 3000 + Math.random() * 4000,
            delay: Math.random() * 4000,
            repeat: -1,
            repeatDelay: Math.random() * 3000,
            onRepeat: () => { b.x = Phaser.Math.Between(10, 440); b.y = by; b.alpha = 0.12 + Math.random() * 0.1; }
        });
        bubbles.push(b);
    }
}

// ──────────────────────────────────────────────
//  GRID
// ──────────────────────────────────────────────
function buildGrid(scene) {
    const startX = 45, startY = 180;
    const cW = 72, cH = 72;

    for (let row = 0; row < 6; row++) {
        for (let col = 0; col < 5; col++) {
            let x = startX + col * cW;
            let y = startY + row * cH;

            let cellG = scene.add.graphics();
            cellG.fillStyle(0x00f2fe, 0.01);
            cellG.fillRoundedRect(x - cW/2 + 3, y - cH/2 + 3, cW - 6, cH - 6, 6);
            cellG.lineStyle(1, 0x00f2fe, 0.07);
            cellG.strokeRoundedRect(x - cW/2 + 3, y - cH/2 + 3, cW - 6, cH - 6, 6);

            let zone = scene.add.zone(x, y, cW, cH).setInteractive();
            zone.setData('occupied', false);
            zone.setData('col', col);
            zone.setData('row', row);

            zone.on('pointerover', () => {
                if (zone.getData('occupied')) return;
                cellG.clear();
                cellG.fillStyle(0x00f2fe, 0.06);
                cellG.fillRoundedRect(x - cW/2 + 3, y - cH/2 + 3, cW - 6, cH - 6, 6);
                cellG.lineStyle(1, 0x00f2fe, 0.3);
                cellG.strokeRoundedRect(x - cW/2 + 3, y - cH/2 + 3, cW - 6, cH - 6, 6);
            });
            zone.on('pointerout', () => {
                cellG.clear();
                cellG.fillStyle(0x00f2fe, 0.01);
                cellG.fillRoundedRect(x - cW/2 + 3, y - cH/2 + 3, cW - 6, cH - 6, 6);
                cellG.lineStyle(1, 0x00f2fe, 0.07);
                cellG.strokeRoundedRect(x - cW/2 + 3, y - cH/2 + 3, cW - 6, cH - 6, 6);
            });

            zone.on('pointerdown', () => placeDefender(scene, zone, x, y));
        }
    }
}

function placeDefender(scene, zone, x, y) {
    if (!window._gameStarted || gamePaused) return;
    if (zone.getData('occupied')) return;

    const costs = { seahorse: 50, coral: 25, clam: 75 };
    let cost = costs[currentSelection];
    if (lightOrbs < cost) {
        // Shake HUD
        scene.cameras.main.shake(150, 0.004);
        return;
    }

    lightOrbs -= cost;
    zone.setData('occupied', true);

    let emoji = { seahorse:'🐴', coral:'🪸', clam:'🦪' }[currentSelection];
    let hp    = { seahorse:100, coral:60, clam: upgrades.clamHp }[currentSelection];

    let def = scene.add.text(x, y, emoji, { fontSize: '30px' }).setOrigin(0.5);
    scene.physics.add.existing(def);
    def.setData({ hp, maxHp: hp, type: currentSelection, gridZone: zone, eating: false });
    defenders.add(def);

    // Place anim
    def.setScale(0);
    scene.tweens.add({ targets: def, scaleX: 1, scaleY: 1, duration: 220, ease: 'Back.easeOut' });

    // HP bar
    let hpBg  = scene.add.graphics();
    let hpBar = scene.add.graphics();
    def.setData('hpBg', hpBg);
    def.setData('hpBar', hpBar);
    drawHpBar(hpBg, hpBar, x, y, 1);

    if (currentSelection === 'seahorse') {
        let t = scene.time.addEvent({
            delay: upgrades.bulletRate,
            callback: () => {
                if (!def.active) { t.destroy(); return; }
                fireBullet(scene, x, y - 18);
            },
            loop: true
        });
        defenderTimers.push(t);
    } else if (currentSelection === 'coral') {
        let t = scene.time.addEvent({
            delay: upgrades.coralRate,
            callback: () => {
                if (!def.active) { t.destroy(); return; }
                spawnOrb(scene, x + Phaser.Math.Between(-14, 14), y + Phaser.Math.Between(-14, 14));
            },
            loop: true
        });
        defenderTimers.push(t);
    }

    updateUI_global(scene);
}

function fireBullet(scene, x, y) {
    let b = scene.add.circle(x, y, 5, 0x00f2fe);
    scene.physics.add.existing(b);
    b.setData('dmg', upgrades.bulletDmg);
    bullets.add(b);
    b.body.setVelocityY(-upgrades.bulletSpeed);

    // Bullet glow ring
    let ring = scene.add.circle(x, y, 8, 0x00f2fe, 0.2);
    scene.tweens.add({
        targets: ring, scaleX: 2, scaleY: 2, alpha: 0, duration: 200,
        onComplete: () => ring.destroy()
    });
}

function drawHpBar(bg, bar, x, y, ratio) {
    bg.clear();
    bar.clear();
    let W = 36, H = 4;
    bg.fillStyle(0x131924, 1);
    bg.fillRoundedRect(x - W/2, y + 18, W, H, 2);
    let color = ratio > 0.5 ? 0x00ffc8 : ratio > 0.25 ? 0xffb800 : 0xff3b30;
    bar.fillStyle(color, 1);
    bar.fillRoundedRect(x - W/2, y + 18, W * ratio, H, 2);
}

// ──────────────────────────────────────────────
//  HUD
// ──────────────────────────────────────────────
function buildHUD(scene) {
    let hudBg = scene.add.graphics();
    hudBg.fillStyle(0x020611, 0.97);
    hudBg.fillRect(0, 0, 450, 118);
    hudBg.lineStyle(1, 0x00f2fe, 0.12);
    hudBg.strokeLineShape(new Phaser.Geom.Line(0, 118, 450, 118));

    // Dividers
    hudBg.lineStyle(1, 0x00f2fe, 0.06);
    hudBg.strokeLineShape(new Phaser.Geom.Line(200, 12, 200, 96));

    lightText  = scene.add.text(22, 18, '✨ 150', { fontSize: '22px', fill: '#fffb00', fontWeight: '800' });
    chargeText = scene.add.text(22, 56, '💥 2 Charges', { fontSize: '12px', fill: '#ff6b35', fontWeight: '700' });
    scoreText  = scene.add.text(22, 80, '🏆 0', { fontSize: '12px', fill: '#6a8aaa', fontWeight: '600' });

    levelText  = scene.add.text(428, 18, 'LEVEL 1', { fontSize: '18px', fill: '#00f2fe', fontWeight: '900', letterSpacing: 1 }).setOrigin(1, 0);
    scene.add.text(428, 52, 'WAVE PROGRESS', { fontSize: '9px', fill: '#384560', fontWeight: '700', letterSpacing: 1 }).setOrigin(1, 0);

    progressBarBg = scene.add.graphics();
    progressBarBg.fillStyle(0x101825, 1);
    progressBarBg.fillRoundedRect(210, 66, 218, 7, 3);
    progressBarFill = scene.add.graphics();

    waveProgressText = scene.add.text(428, 80, '0 / 10', { fontSize: '10px', fill: '#4a6080', fontWeight: '600' }).setOrigin(1, 0);
}

// ──────────────────────────────────────────────
//  BOSS BAR
// ──────────────────────────────────────────────
function buildBossBar(scene) {
    bossBarBg = scene.add.graphics().setVisible(false);
    bossBar   = scene.add.graphics().setVisible(false);
    bossLabel = scene.add.text(225, 140, '👾 BOSS', {
        fontSize: '11px', fill: '#ff3b30', fontWeight: '800', letterSpacing: 3
    }).setOrigin(0.5).setVisible(false);
}

// ──────────────────────────────────────────────
//  CARD DECK
// ──────────────────────────────────────────────
function buildCardDeck(scene) {
    let deckBg = scene.add.graphics();
    deckBg.fillStyle(0x020611, 1);
    deckBg.fillRect(0, 695, 450, 85);
    deckBg.lineStyle(1, 0x00f2fe, 0.1);
    deckBg.strokeLineShape(new Phaser.Geom.Line(0, 695, 450, 695));

    cardSeahorse = scene.add.container(75, 737);
    bg1 = scene.add.graphics();
    cardSeahorse.add(bg1);
    cardSeahorse.add([
        scene.add.text(0, -12, '🐴', { fontSize: '24px' }).setOrigin(0.5),
        scene.add.text(0, 14,  'SEAHORSE', { fontSize: '7px', fill: '#5a8aaa', fontWeight: '700', letterSpacing: 1 }).setOrigin(0.5),
        scene.add.text(0, 24,  '50 ORB', { fontSize: '9px', fill: '#fffb00', fontWeight: '800' }).setOrigin(0.5)
    ]);
    scene.add.zone(75, 737, 90, 62).setInteractive().on('pointerdown', () => selectCard('seahorse', scene));

    cardCoral = scene.add.container(225, 737);
    bg2 = scene.add.graphics();
    cardCoral.add(bg2);
    cardCoral.add([
        scene.add.text(0, -12, '🪸', { fontSize: '24px' }).setOrigin(0.5),
        scene.add.text(0, 14,  'CORAL', { fontSize: '7px', fill: '#5a8aaa', fontWeight: '700', letterSpacing: 1 }).setOrigin(0.5),
        scene.add.text(0, 24,  '25 ORB', { fontSize: '9px', fill: '#fffb00', fontWeight: '800' }).setOrigin(0.5)
    ]);
    scene.add.zone(225, 737, 90, 62).setInteractive().on('pointerdown', () => selectCard('coral', scene));

    cardClam = scene.add.container(375, 737);
    bg3 = scene.add.graphics();
    cardClam.add(bg3);
    cardClam.add([
        scene.add.text(0, -12, '🦪', { fontSize: '24px' }).setOrigin(0.5),
        scene.add.text(0, 14,  'CLAM', { fontSize: '7px', fill: '#5a8aaa', fontWeight: '700', letterSpacing: 1 }).setOrigin(0.5),
        scene.add.text(0, 24,  '75 ORB', { fontSize: '9px', fill: '#fffb00', fontWeight: '800' }).setOrigin(0.5)
    ]);
    scene.add.zone(375, 737, 90, 62).setInteractive().on('pointerdown', () => selectCard('clam', scene));
}

function selectCard(type, scene) {
    currentSelection = type;
    updateUI_global(scene);
}

// ──────────────────────────────────────────────
//  DEPTH CHARGE BUTTON
// ──────────────────────────────────────────────
function buildDepthChargeButton(scene) {
    scene.add.text(225, 614, '💥 HOLD LANE TO DETONATE DEPTH CHARGE', {
        fontSize: '8px', fill: '#ff6b35', fontWeight: '700', letterSpacing: 1
    }).setOrigin(0.5).setAlpha(0.5);

    // Invisible zones for each of 5 columns at the bottom of the grid
    for (let col = 0; col < 5; col++) {
        let lx = 45 + col * 72;
        let dcZone = scene.add.zone(lx, 600, 68, 28).setInteractive();
        dcZone.on('pointerdown', () => {
            if (!window._gameStarted || gamePaused || depthCharges <= 0) return;
            detonateColumn(scene, col);
        });
    }
}

// ──────────────────────────────────────────────
//  COMBAT
// ──────────────────────────────────────────────
function setupCombat(scene) {
    scene.physics.add.overlap(bullets, scavengers, (bullet, enemy) => {
        let hx = bullet.x, hy = bullet.y;
        let dmg = bullet.getData('dmg') || upgrades.bulletDmg;

        // Crit check (20%)
        let isCrit = Math.random() < 0.20;
        if (isCrit) dmg = Math.round(dmg * 2.2);
        bullet.destroy();

        impactRing(scene, hx, hy, isCrit);

        let hp = enemy.getData('hp') - dmg;
        enemy.setData('hp', hp);
        enemy.setTint(isCrit ? 0xffa500 : 0xff3b30);
        scene.time.delayedCall(80, () => { if (enemy.active) enemy.clearTint(); });

        // Damage popup
        let col = isCrit ? '#ffa500' : '#ff3b30';
        let sz  = isCrit ? '17px' : '13px';
        let pop = scene.add.text(hx, hy - 12, (isCrit ? '💥 ' : '-') + dmg, {
            fontSize: sz, fill: col, fontWeight: '800'
        }).setOrigin(0.5).setDepth(10);
        scene.tweens.add({ targets: pop, y: hy - 42, alpha: 0, duration: 700, onComplete: () => pop.destroy() });

        if (hp <= 0) killEnemy(scene, enemy);
    });

    scene.physics.add.overlap(scavengers, defenders, (enemy, defender) => {
        if (enemy.getData('eating')) return;
        enemy.body.setVelocityY(0);
        enemy.setData('eating', true);

        let biteT = scene.time.addEvent({
            delay: 850,
            callback: () => {
                if (!defender.active || !enemy.active) {
                    biteT.destroy();
                    if (enemy.active) { enemy.setData('eating', false); enemy.body.setVelocityY(enemy.getData('speed')); }
                    return;
                }
                let dHp = defender.getData('hp') - 22;
                defender.setData('hp', dHp);
                let maxHp = defender.getData('maxHp');
                let zone  = defender.getData('gridZone');
                let hpBg  = defender.getData('hpBg');
                let hpBar = defender.getData('hpBar');
                if (hpBg && hpBar) drawHpBar(hpBg, hpBar, zone.x, zone.y, Math.max(0, dHp / maxHp));

                defender.setTint(0xff3b30);
                scene.time.delayedCall(60, () => { if (defender.active) defender.clearTint(); });

                if (dHp <= 0) {
                    defender.getData('gridZone').setData('occupied', false);
                    if (defender.getData('hpBg'))  { defender.getData('hpBg').destroy();  }
                    if (defender.getData('hpBar')) { defender.getData('hpBar').destroy(); }
                    defender.destroy();
                    biteT.destroy();
                    if (enemy.active) { enemy.setData('eating', false); enemy.body.setVelocityY(enemy.getData('speed')); }
                }
            },
            loop: true
        });
    });
}

function killEnemy(scene, enemy) {
    if (!enemy.active) return;

    let ex = enemy.x, ey = enemy.y;
    enemy.destroy();

    score += 15;
    enemiesDefeatedInLevel++;

    // Combo system
    killStreak++;
    if (comboTimer) comboTimer.destroy();
    if (killStreak >= 2) showCombo(ex, killStreak);
    if (killStreak >= 3) {
        let bonus = Math.floor(killStreak / 2) * 8;
        lightOrbs += bonus;
        let bonusTxt = scene.add.text(ex, ey - 30, '+' + bonus + ' ORB!', {
            fontSize: '13px', fill: '#fffb00', fontWeight: '800'
        }).setOrigin(0.5).setDepth(10);
        scene.tweens.add({ targets: bonusTxt, y: ey - 70, alpha: 0, duration: 900, onComplete: () => bonusTxt.destroy() });
    }
    comboTimer = scene.time.delayedCall(2200, () => { killStreak = 0; });

    // Death burst
    for (let i = 0; i < 5; i++) {
        let dot = scene.add.circle(ex, ey, 3, 0x00ffc8, 0.8);
        scene.tweens.add({
            targets: dot,
            x: ex + Phaser.Math.Between(-40, 40),
            y: ey + Phaser.Math.Between(-40, 40),
            alpha: 0, scale: 0, duration: 500,
            onComplete: () => dot.destroy()
        });
    }

    updateUI_global(scene);

    let isBoss = enemy.getData('boss');
    if (isBoss) {
        bossActive = false;
        bossBarBg.setVisible(false); bossBar.setVisible(false); bossLabel.setVisible(false);
        lightOrbs += 60;
        scene.cameras.main.shake(300, 0.012);
        let bonusTxt = scene.add.text(225, 380, '🎉 BOSS DEFEATED!\n+60 ORBS', {
            fontSize: '22px', fill: '#00ffc8', align: 'center', fontWeight: '900'
        }).setOrigin(0.5).setDepth(20);
        scene.tweens.add({ targets: bonusTxt, alpha: 0, duration: 2000, delay: 1000, onComplete: () => bonusTxt.destroy() });
        advanceNextLevel(scene);
        return;
    }

    if (enemiesDefeatedInLevel >= totalEnemiesInLevel && !bossActive) {
        advanceNextLevel(scene);
    }
}

function impactRing(scene, x, y, isCrit) {
    let color = isCrit ? 0xffa500 : 0x00f2fe;
    let ring  = scene.add.circle(x, y, 4, color, 0.6);
    scene.tweens.add({
        targets: ring, scaleX: isCrit ? 4 : 3, scaleY: isCrit ? 4 : 3, alpha: 0, duration: isCrit ? 350 : 220,
        onComplete: () => ring.destroy()
    });
}

// ──────────────────────────────────────────────
//  LEVEL ENGINE
// ──────────────────────────────────────────────
function startLevelEngine(scene) {
    gamePaused = false;
    bossActive = false;
    totalEnemiesInLevel = 8 + currentLevel * 4;
    enemiesDefeatedInLevel = 0;
    spawnedCount = 0;
    updateUI_global(scene);

    let isBossLevel = currentLevel % 5 === 0;
    let spawnDelay  = Math.max(1200, 4200 - currentLevel * 350);

    if (spawnTimer) spawnTimer.destroy();

    if (isBossLevel) {
        // Boss: spawn normal wave then boss
        totalEnemiesInLevel = 5 + currentLevel * 2;
    }

    spawnTimer = scene.time.addEvent({
        delay: spawnDelay,
        callback: () => {
            if (!window._gameStarted || gamePaused) return;
            if (spawnedCount >= totalEnemiesInLevel) return;

            let lane   = Phaser.Math.Between(0, 4);
            let enemyX = 45 + lane * 72;

            let roll    = Math.random();
            let isHard  = roll < 0.12 + currentLevel * 0.04;
            let isArmor = roll < 0.06 + currentLevel * 0.015;

            let emoji, hp, speed, reward;
            if (isArmor)     { emoji = '🪖'; hp = 200 + currentLevel * 15; speed = 18 + currentLevel * 2; reward = 30; }
            else if (isHard) { emoji = '📦'; hp = 120 + currentLevel * 10; speed = 25 + currentLevel * 2; reward = 20; }
            else             { emoji = '🦀'; hp = 45  + currentLevel * 5;  speed = 40 + currentLevel * 2; reward = 15; }

            spawnEnemy(scene, enemyX, emoji, hp, speed, reward);
            spawnedCount++;
        },
        loop: true
    });
}

function spawnEnemy(scene, x, emoji, hp, speed, reward, isBoss) {
    let sz = isBoss ? '46px' : '28px';
    let enemy = scene.add.text(x, isBoss ? 130 : -25, emoji, { fontSize: sz }).setOrigin(0.5);
    scene.physics.add.existing(enemy);
    enemy.setData({ hp, maxHp: hp, speed, reward: reward || 0, eating: false, boss: !!isBoss });
    scavengers.add(enemy);
    enemy.body.setVelocityY(speed);

    if (isBoss) {
        bossActive = true;
        bossBarBg.setVisible(true);
        bossBar.setVisible(true);
        bossLabel.setVisible(true);

        scene.tweens.add({ targets: [bossBarBg, bossBar, bossLabel], alpha: { from: 0, to: 1 }, duration: 400 });

        // Link boss to bar
        enemy.setData('bossBarRef', { bossBar, bossBarBg, scene });
        scene.cameras.main.shake(250, 0.01);
    }
}

function advanceNextLevel(scene) {
    gamePaused = true;
    if (spawnTimer) spawnTimer.destroy();
    scavengers.clear(true, true);
    bullets.clear(true, true);

    currentLevel++;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('td_hs', highScore);
    }

    // Win flash
    let wTxt = scene.add.text(225, 370, '✅ TRENCH SECURED\nLEVEL ' + (currentLevel - 1) + ' COMPLETE', {
        fontSize: '22px', fill: '#00ffc8', align: 'center', fontWeight: '900', letterSpacing: 2
    }).setOrigin(0.5).setDepth(20);
    wTxt.setScale(0);
    scene.tweens.add({ targets: wTxt, scaleX: 1, scaleY: 1, duration: 280, ease: 'Back.easeOut' });

    // Bonus orbs per level
    let bonusOrbs = 30 + currentLevel * 5;
    lightOrbs += bonusOrbs;
    let bTxt = scene.add.text(225, 430, '+' + bonusOrbs + ' ORBs BONUS!', {
        fontSize: '15px', fill: '#fffb00', fontWeight: '800'
    }).setOrigin(0.5).setDepth(20);
    scene.tweens.add({ targets: bTxt, alpha: 0, duration: 1200, delay: 1200, onComplete: () => bTxt.destroy() });

    scene.time.delayedCall(2400, () => {
        wTxt.destroy();
        if (currentLevel > 2 && currentLevel % 3 !== 0) {
            showUpgradeScreen(scene);
        } else {
            startLevelEngine(scene);
        }
    });
}

// ──────────────────────────────────────────────
//  ORB
// ──────────────────────────────────────────────
function spawnOrb(scene, x, y) {
    let orb = scene.add.circle(x, y, 13, 0xfffb00).setInteractive().setDepth(5);
    scene.physics.add.existing(orb);
    orb.body.setAllowGravity(false);
    scene.tweens.add({
        targets: orb, scaleX: 1.25, scaleY: 1.25, alpha: 0.5,
        duration: 700, yoyo: true, repeat: -1
    });
    // Pulse ring
    let ring = scene.add.circle(x, y, 20, 0xfffb00, 0.15).setDepth(4);
    scene.tweens.add({
        targets: ring, scaleX: 1.8, scaleY: 1.8, alpha: 0,
        duration: 900, repeat: -1, repeatDelay: 300,
        onRepeat: () => { ring.setScale(1); ring.setAlpha(0.15); }
    });

    orb.on('pointerdown', () => {
        lightOrbs += upgrades.orbValue;
        updateUI_global(scene);
        orb.destroy();
        ring.destroy();
        let txt = scene.add.text(x, y - 20, '+' + upgrades.orbValue, {
            fontSize: '14px', fill: '#fffb00', fontWeight: '800'
        }).setOrigin(0.5).setDepth(10);
        scene.tweens.add({ targets: txt, y: y - 50, alpha: 0, duration: 600, onComplete: () => txt.destroy() });
    });

    // Auto-destroy after 8s
    scene.time.delayedCall(8000, () => { if (orb.active) { orb.destroy(); ring.destroy(); } });
    floatingOrbPool.push({ orb, ring });
}

// ──────────────────────────────────────────────
//  DEPTH CHARGE  (right-click or long-press a lane column)
// ──────────────────────────────────────────────
function detonateColumn(scene, col) {
    if (depthCharges <= 0) return;
    depthCharges--;
    updateUI_global(scene);

    let laneX = 45 + col * 72;

    // Shockwave
    let shockwave = scene.add.rectangle(laneX, 390, 72, 780, 0xff6b35, 0.15).setDepth(15);
    scene.tweens.add({ targets: shockwave, alpha: 0, scaleY: 1.3, duration: 600, onComplete: () => shockwave.destroy() });

    scene.cameras.main.shake(200, 0.01);

    scavengers.getChildren().forEach(e => {
        if (!e.active) return;
        if (Math.abs(e.x - laneX) < 40) killEnemy(scene, e);
    });
}

// ──────────────────────────────────────────────
//  UI UPDATE
// ──────────────────────────────────────────────
function updateUI_global(scene) {
    if (!lightText) return;
    lightText.setText('✨ ' + lightOrbs);
    chargeText.setText('💥 ' + depthCharges + ' Charge' + (depthCharges !== 1 ? 's' : ''));
    scoreText.setText('🏆 ' + score + '   ⭐ Best: ' + highScore);
    levelText.setText('LEVEL ' + currentLevel);
    waveProgressText.setText(enemiesDefeatedInLevel + ' / ' + totalEnemiesInLevel);

    progressBarFill.clear();
    progressBarFill.fillStyle(0x00f2fe, 1);
    let ratio = Math.min(1, enemiesDefeatedInLevel / Math.max(1, totalEnemiesInLevel));
    progressBarFill.fillRoundedRect(210, 66, 218 * ratio, 7, 3);

    if (bg1) drawCard(bg1, currentSelection === 'seahorse', lightOrbs >= 50);
    if (bg2) drawCard(bg2, currentSelection === 'coral',    lightOrbs >= 25);
    if (bg3) drawCard(bg3, currentSelection === 'clam',     lightOrbs >= 75);
}

function drawCard(gfx, selected, canAfford) {
    gfx.clear();
    let fill   = canAfford ? 0x0a1830 : 0x06090f;
    let stroke = selected ? 0x00f2fe : (canAfford ? 0x1e3050 : 0x101820);
    let alpha  = selected ? 1 : (canAfford ? 0.5 : 0.25);
    gfx.fillStyle(fill, 1);
    gfx.fillRoundedRect(-45, -32, 90, 64, 10);
    gfx.lineStyle(selected ? 2 : 1, stroke, alpha);
    gfx.strokeRoundedRect(-45, -32, 90, 64, 10);
    if (selected) {
        gfx.lineStyle(1, 0x00f2fe, 0.2);
        gfx.strokeRoundedRect(-42, -29, 84, 58, 8);
    }
}

// ──────────────────────────────────────────────
//  BOSS BAR UPDATE
// ──────────────────────────────────────────────
function updateBossBar(hp, maxHp) {
    bossBarBg.clear();
    bossBar.clear();
    bossBarBg.fillStyle(0x101825, 1);
    bossBarBg.fillRoundedRect(60, 128, 330, 10, 5);
    let ratio = Math.max(0, hp / maxHp);
    let col = ratio > 0.5 ? 0xff3b30 : ratio > 0.2 ? 0xff8c00 : 0xffdd00;
    bossBar.fillStyle(col, 1);
    bossBar.fillRoundedRect(60, 128, 330 * ratio, 10, 5);
}

// ──────────────────────────────────────────────
//  UPDATE LOOP
// ──────────────────────────────────────────────
function update() {
    const scene = this;

    bullets.getChildren().forEach(b => {
        if (b && b.y < 118) b.destroy();
    });

    scavengers.getChildren().forEach(e => {
        if (!e || !e.active) return;

        // Depth charge: right-click / column tap
        if (e.getData('boss')) {
            let hp  = e.getData('hp');
            let mxH = e.getData('maxHp');
            updateBossBar(hp, mxH);
        }

        if (e.y > 628) {
            e.destroy();
            scene.cameras.main.shake(400, 0.018);

            let failTxt = scene.add.text(225, 380, '💀 TRENCH OVERRUN!\nLevel ' + currentLevel + ' — Score: ' + score, {
                fontSize: '22px', fill: '#ff3b30', align: 'center', fontWeight: '900'
            }).setOrigin(0.5).setDepth(30);
            failTxt.setScale(0);
            scene.tweens.add({ targets: failTxt, scaleX: 1, scaleY: 1, duration: 300, ease: 'Back.easeOut' });

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('td_hs', highScore);
            }

            gamePaused = true;
            if (spawnTimer) spawnTimer.destroy();
            scavengers.clear(true, true);

            scene.time.delayedCall(2800, () => {
                failTxt.destroy();
                resetGame(scene);
            });
        }
    });
}

function resetGame(scene) {
    lightOrbs = 150;
    score = 0;
    currentLevel = 1;
    killStreak = 0;
    depthCharges = 2;
    enemiesDefeatedInLevel = 0;
    spawnedCount = 0;
    bossActive = false;

    upgrades = { bulletDmg: 25, bulletSpeed: 380, bulletRate: 1400, orbValue: 25, coralRate: 4500, clamHp: 450 };

    defenders.getChildren().forEach(d => {
        if (d.getData('hpBg'))  d.getData('hpBg').destroy();
        if (d.getData('hpBar')) d.getData('hpBar').destroy();
    });
    defenders.clear(true, true);
    bullets.clear(true, true);
    defenderTimers.forEach(t => t.destroy());
    defenderTimers = [];

    bossBarBg.setVisible(false);
    bossBar.setVisible(false);
    bossLabel.setVisible(false);

    updateUI_global(scene);
    window._gameStarted = false;
    showStartScreen();
}
</script>
