<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trench Defense - Premium Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.86.0/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #03060f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }
        #game-container {
            box-shadow: 0 15px 50px rgba(0, 242, 254, 0.2);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 450,
        height: 780,
        parent: 'game-container',
        backgroundColor: '#040b18',
        physics: {
            default: 'arcade',
            arcade: { debug: false }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    const game = new Phaser.Game(config);

    // Core States
    let lightOrbs = 150;
    let score = 0;
    let currentLevel = 1;
    let enemiesDefeatedInLevel = 0;
    let totalEnemiesInLevel = 10;
    let currentSelection = 'seahorse';

    // UI Objects
    let lightText, scoreText, levelText, waveProgressText;
    let progressBarFill;
    let bg1, bg2, bg3; 

    // Logic Groups
    let bullets, scavengers, defenders;
    let spawnTimer;

    function preload() {}

    function create() {
        const scene = this;

        bullets = scene.physics.add.group();
        scavengers = scene.physics.add.group();
        defenders = scene.physics.add.group();

        // 1. ATMOSPHERIC GRAPHICS DEEP OCEAN
        let deepBg = scene.add.graphics();
        deepBg.fillGradientStyle(0x020714, 0x020714, 0x041324, 0x041324, 1);
        deepBg.fillRect(0, 0, 450, 780);

        // Grid scan lines for premium look
        deepBg.lineStyle(1, 0x00f2fe, 0.03);
        for(let i = 0; i <= 450; i += 45) {
            deepBg.strokeLineShape(new Phaser.Geom.Line(i, 0, i, 780));
        }

        // 2. REEF GUARD INTERFACE LINE
        let reefBg = scene.add.graphics();
        reefBg.fillGradientStyle(0x020714, 0x020714, 0x001f1b, 0x001f1b, 0.9);
        reefBg.fillRect(0, 630, 450, 65);
        reefBg.lineStyle(1, 0x00ffc8, 0.25);
        reefBg.strokeLineShape(new Phaser.Geom.Line(0, 630, 450, 630));
        scene.add.text(225, 662, '🛡️ MOTHER REEF SHIELD ACTIVE', { fontSize: '12px', fill: '#00ffc8', fontWeight: '700', letterSpacing: 2 }).setOrigin(0.5);

        // 3. MATHEMATICALLY BALANCED TACTICAL GRID
        const startX = 45;
        const startY = 175;
        const cellWidth = 72;
        const cellHeight = 74;

        for (let row = 0; row < 6; row++) {
            for (let col = 0; col < 5; col++) {
                let x = startX + (col * cellWidth);
                let y = startY + (row * cellHeight);

                let cellGraphic = scene.add.graphics();
                cellGraphic.fillStyle(0x00f2fe, 0.012);
                cellGraphic.fillRoundedRect(x - cellWidth/2 + 3, y - cellHeight/2 + 3, cellWidth - 6, cellHeight - 6, 6);
                cellGraphic.lineStyle(1, 0x00f2fe, 0.07);
                cellGraphic.strokeRoundedRect(x - cellWidth/2 + 3, y - cellHeight/2 + 3, cellWidth - 6, cellHeight - 6, 6);

                let hitZone = scene.add.zone(x, y, cellWidth, cellHeight).setInteractive();
                hitZone.setData('occupied', false);

                hitZone.on('pointerdown', () => {
                    if (hitZone.getData('occupied')) return;

                    let cost = currentSelection === 'seahorse' ? 50 : currentSelection === 'coral' ? 25 : 75;
                    
                    if (lightOrbs >= cost) {
                        lightOrbs -= cost;
                        hitZone.setData('occupied', true);
                        
                        let emoji = '🐴';
                        let hp = 100;
                        if (currentSelection === 'coral') { emoji = '🪸'; hp = 60; }
                        if (currentSelection === 'clam') { emoji = '🦪'; hp = 450; }

                        let defText = scene.add.text(x, y, emoji, { fontSize: '32px' }).setOrigin(0.5);
                        scene.physics.add.existing(defText);
                        defText.setData('hp', hp);
                        defText.setData('type', currentSelection);
                        defText.setData('gridZone', hitZone);
                        defenders.add(defText);

                        defText.setScale(0);
                        scene.tweens.add({
                            targets: defText,
                            scaleX: 1, scaleY: 1,
                            duration: 200,
                            ease: 'Back.easeOut'
                        });

                        if (currentSelection === 'seahorse') {
                            scene.time.addEvent({
                                delay: 1400,
                                callback: () => {
                                    if (!defText.active) return;
                                    let b = scene.add.circle(x, y - 20, 5, 0x00f2fe);
                                    bullets.add(b);
                                    b.body.setVelocityY(-380);
                                },
                                loop: true
                            });
                        } else if (currentSelection === 'coral') {
                            scene.time.addEvent({
                                delay: 4500,
                                callback: () => {
                                    if (!defText.active) return;
                                    spawnOrb(scene, x + Phaser.Math.Between(-12, 12), y + Phaser.Math.Between(-12, 12));
                                },
                                loop: true
                            });
                        }
                        updateUISlice();
                    }
                });
            }
        }

        // 4. BALANCED PREMIUM HEAD HUD PANEL
        let hudBg = scene.add.graphics();
        hudBg.fillStyle(0x020611, 0.95);
        hudBg.fillRect(0, 0, 450, 115);
        hudBg.lineStyle(1, 0x00f2fe, 0.15);
        hudBg.strokeLineShape(new Phaser.Geom.Line(0, 115, 450, 115));

        // Subtly enclosed dashboard capsules
        lightText = scene.add.text(25, 24, '✨ ' + lightOrbs, { fontSize: '20px', fill: '#fffb00', fontWeight: '700' });
        scoreText = scene.add.text(25, 58, '🏆 ' + score, { fontSize: '14px', fill: '#a0aec0', fontWeight: '500' });
        levelText = scene.add.text(425, 22, 'LEVEL ' + currentLevel, { fontSize: '18px', fill: '#00f2fe', fontWeight: '800', letterSpacing: 1 }).setOrigin(1, 0);

        waveProgressText = scene.add.text(425, 58, 'WAVE PROGRESS', { fontSize: '10px', fill: '#4a5568', fontWeight: '700', letterSpacing: 1 }).setOrigin(1, 0);
        let progressBarBg = scene.add.graphics();
        progressBarBg.fillStyle(0x131924, 1);
        progressBarBg.fillRoundedRect(25, 88, 400, 6, 3);
        progressBarFill = scene.add.graphics();

        // 5. FLOATING TACTICAL COMMAND DECKS
        let deckBg = scene.add.graphics();
        deckBg.fillStyle(0x020611, 1);
        deckBg.fillRect(0, 695, 450, 85);
        deckBg.lineStyle(1, 0x00f2fe, 0.12);
        deckBg.strokeLineShape(new Phaser.Geom.Line(0, 695, 450, 695));

        // Card 1: Seahorse
        cardSeahorse = scene.add.container(85, 738);
        bg1 = scene.add.graphics();
        cardSeahorse.add(bg1);
        cardSeahorse.add([scene.add.text(0, -10, '🐴', { fontSize: '24px' }).setOrigin(0.5), scene.add.text(0, 16, '50 LGT', { fontSize: '10px', fill: '#fffb00', fontWeight: '700' }).setOrigin(0.5)]);
        let zone1 = scene.add.zone(85, 738, 82, 60).setInteractive();
        zone1.on('pointerdown', () => selectCard('seahorse'));

        // Card 2: Coral
        cardCoral = scene.add.container(225, 738);
        bg2 = scene.add.graphics();
        cardCoral.add(bg2);
        cardCoral.add([scene.add.text(0, -10, '🪸', { fontSize: '24px' }).setOrigin(0.5), scene.add.text(0, 16, '25 LGT', { fontSize: '10px', fill: '#fffb00', fontWeight: '700' }).setOrigin(0.5)]);
        let zone2 = scene.add.zone(225, 738, 82, 60).setInteractive();
        zone2.on('pointerdown', () => selectCard('coral'));

        // Card 3: Clam
        cardClam = scene.add.container(365, 738);
        bg3 = scene.add.graphics();
        cardClam.add(bg3);
        cardClam.add([scene.add.text(0, -10, '🦪', { fontSize: '24px' }).setOrigin(0.5), scene.add.text(0, 16, '75 LGT', { fontSize: '10px', fill: '#fffb00', fontWeight: '700' }).setOrigin(0.5)]);
        let zone3 = scene.add.zone(365, 738, 82, 60).setInteractive();
        zone3.on('pointerdown', () => selectCard('clam'));

        function selectCard(type) {
            currentSelection = type;
            updateUISlice();
        }

        // Ambient Resource loop
        scene.time.addEvent({
            delay: 4500,
            callback: () => spawnOrb(scene, Phaser.Math.Between(40, 410), Phaser.Math.Between(160, 540)),
            loop: true
        });

        startLevelEngine(scene);

        // Bullets Impact & Combat
        scene.physics.add.overlap(bullets, scavengers, (bullet, enemy) => {
            let hitX = bullet.x;
            let hitY = bullet.y;
            bullet.destroy();

            let currentHp = enemy.getData('hp') - 25;
            enemy.setData('hp', currentHp);

            // Red flashing visual feedback
            enemy.setTint(0xff3b30);
            scene.time.delayedCall(80, () => { if(enemy.active) enemy.clearTint(); });

            // Animated Damage Numbers Popup
            let dmgPopup = scene.add.text(hitX, hitY - 15, '-25', { fontSize: '14px', fill: '#ff3b30', fontWeight: '700' }).setOrigin(0.5);
            scene.tweens.add({
                targets: dmgPopup,
                y: hitY - 40,
                alpha: 0,
                duration: 600,
                onComplete: () => dmgPopup.destroy()
            });

            if (currentHp <= 0) {
                enemy.destroy();
                score += 15;
                enemiesDefeatedInLevel++;
                updateUISlice();

                if (enemiesDefeatedInLevel >= totalEnemiesInLevel) {
                    advanceNextLevel(scene);
                }
            }
        });

        // Eating Combat Logic
        scene.physics.add.overlap(scavengers, defenders, (enemy, defender) => {
            enemy.body.setVelocityY(0);
            if (!enemy.getData('eating')) {
                enemy.setData('eating', true);
                let biteTimer = scene.time.addEvent({
                    delay: 800,
                    callback: () => {
                        if (!defender.active || !enemy.active) {
                            biteTimer.destroy();
                            if(enemy.active) {
                                enemy.setData('eating', false);
                                enemy.body.setVelocityY(enemy.getData('speed'));
                            }
                            return;
                        }
                        let defHp = defender.getData('hp') - 20;
                        defender.setData('hp', defHp);
                        if (defHp <= 0) {
                            defender.getData('gridZone').setData('occupied', false);
                            defender.destroy();
                            biteTimer.destroy();
                            if (enemy.active) {
                                enemy.setData('eating', false);
                                enemy.body.setVelocityY(enemy.getData('speed'));
                            }
                        }
                    },
                    loop: true
                });
            }
        });

        // Force initialize card UI layouts
        updateUISlice();
    }

    function startLevelEngine(scene) {
        totalEnemiesInLevel = 8 + (currentLevel * 4);
        enemiesDefeatedInLevel = 0;
        updateUISlice();

        let spawnDelay = Math.max(1400, 4200 - (currentLevel * 400));
        if (spawnTimer) spawnTimer.destroy();

        let spawnedCount = 0;
        spawnTimer = scene.time.addEvent({
            delay: spawnDelay,
            callback: () => {
                if (spawnedCount >= totalEnemiesInLevel) return;

                let lane = Phaser.Math.Between(0, 4);
                let enemyX = 45 + (lane * 72);
                
                let isHard = Math.random() < (0.15 + (currentLevel * 0.05));
                let enemyEmoji = isHard ? '📦' : '🦀';
                let enemyHp = isHard ? 125 : 50;
                let speed = (isHard ? 28 : 42) + (currentLevel * 3);

                let enemy = scene.add.text(enemyX, -20, enemyEmoji, { fontSize: '28px' }).setOrigin(0.5);
                scene.physics.add.existing(enemy);
                enemy.setData('hp', enemyHp);
                enemy.setData('speed', speed);
                scavengers.add(enemy);
                enemy.body.setVelocityY(speed);

                spawnedCount++;
            },
            loop: true
        });
    }

    function advanceNextLevel(scene) {
        spawnTimer.destroy();
        scavengers.clear(true, true);
        bullets.clear(true, true);

        currentLevel++;
        
        let winText = scene.add.text(225, 380, 'TRENCH SECURED\nLEVEL ' + (currentLevel - 1) + ' COMPLETE', { 
            fontSize: '24px', fill: '#00ffc8', align: 'center', fontWeight: '800', letterSpacing: 2 
        }).setOrigin(0.5);
        
        winText.setScale(0);
        scene.tweens.add({
            targets: winText,
            scaleX: 1, scaleY: 1,
            duration: 300,
            ease: 'Back.easeOut'
        });

        scene.time.delayedCall(2600, () => {
            winText.destroy();
            startLevelEngine(scene);
        });
    }

    function spawnOrb(scene, x, y) {
        let orb = scene.add.circle(x, y, 14, 0xfffb00).setInteractive();
        scene.physics.add.existing(orb);
        orb.body.setAllowGravity(false);

        scene.tweens.add({
            targets: orb,
            alpha: 0.3, scale: 1.2,
            duration: 800, yoyo: true, repeat: -1
        });

        orb.on('pointerdown', () => {
            lightOrbs += 25;
            updateUISlice();
            orb.destroy();
        });
    }

    function drawCardBackground(gfx, isSelected, canAfford) {
        gfx.clear();
        let strokeColor = isSelected ? 0x00f2fe : 0x182438;
        let strokeAlpha = isSelected ? 1 : 0.6;
        let fillColor = canAfford ? 0x0a1626 : 0x060c14;

        gfx.fillStyle(fillColor, 1);
        gfx.fillRoundedRect(-41, -30, 82, 60, 8);
        gfx.lineStyle(isSelected ? 2 : 1, strokeColor, strokeAlpha);
        gfx.strokeRoundedRect(-41, -30, 82, 60, 8);
    }

    function updateUISlice() {
        if (!lightText) return;

        lightText.setText('✨ ' + lightOrbs);
        scoreText.setText('🏆 ' + score);
        levelText.setText('LEVEL ' + currentLevel);

        progressBarFill.clear();
        progressBarFill.fillStyle(0x00f2fe, 1);
        let ratio = Math.min(1, enemiesDefeatedInLevel / totalEnemiesInLevel);
        progressBarFill.fillRoundedRect(25, 88, 400 * ratio, 6, 3);

        if (bg1) drawCardBackground(bg1, currentSelection === 'seahorse', lightOrbs >= 50);
        if (bg2) drawCardBackground(bg2, currentSelection === 'coral', lightOrbs >= 25);
        if (bg3) drawCardBackground(bg3, currentSelection === 'clam', lightOrbs >= 75);
    }

    function update() {
        bullets.getChildren().forEach(b => {
            if (b && b.y < 120) b.destroy();
        });

        scavengers.getChildren().forEach(e => {
            if (e && e.y > 630) {
                e.destroy();
                alert('Trench Overrun! Defeat at Level ' + currentLevel + '.\nFinal Score: ' + score);
                location.reload();
            }
        });
    }
</script>

</body>
</html>
