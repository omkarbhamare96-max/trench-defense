<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trench Defense - Prototype</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.86.0/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #050b14;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        #game-container {
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.2);
            border: 2px solid #00ffc8;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 450,
        height: 750,
        parent: 'game-container',
        backgroundColor: '#0a1526',
        physics: {
            default: 'arcade',
            arcade: { debug: false }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    const game = new Phaser.Game(config);

    let lightOrbs = 100;
    let lightText;
    let bullets;
    let scavengers;
    let defenders;

    function preload() {}

    function create() {
        const scene = this;
        bullets = scene.physics.add.group();
        scavengers = scene.physics.add.group();
        defenders = scene.physics.add.group();

        // Mother Reef Goal Zone
        let reefBg = scene.add.graphics();
        reefBg.fillStyle(0x00ffc8, 0.15);
        reefBg.fillRect(0, 680, 450, 70);
        scene.add.text(225, 715, '⚓ MOTHER REEF ⚓', { fontSize: '18px', fill: '#00ffc8', fontWeight: 'bold' }).setOrigin(0.5);

        // 5-Lane Grid Setup
        const startX = 45;
        const startY = 120;
        const cellWidth = 72;
        const cellHeight = 90;

        for (let row = 0; row < 6; row++) {
            for (let col = 0; col < 5; col++) {
                let x = startX + (col * cellWidth);
                let y = startY + (row * cellHeight);

                let cellGraphic = scene.add.graphics();
                cellGraphic.lineStyle(1, 0x1d3557, 0.5);
                cellGraphic.strokeRect(x - cellWidth/2, y - cellHeight/2, cellWidth, cellHeight);

                let hitZone = scene.add.zone(x, y, cellWidth, cellHeight).setInteractive();
                hitZone.setData('occupied', false);

                hitZone.on('pointerdown', () => {
                    if (!hitZone.getData('occupied') && lightOrbs >= 50) {
                        lightOrbs -= 50;
                        lightText.setText('✨ Light: ' + lightOrbs);
                        hitZone.setData('occupied', true);
                        
                        // Spawn defender directly as text object
                        let defender = scene.add.text(x, y, '🐴', { fontSize: '32px' }).setOrigin(0.5);
                        defenders.add(defender);

                        // Idle squishy stretch animation
                        scene.tweens.add({
                            targets: defender,
                            scaleY: 1.2,
                            scaleX: 0.85,
                            duration: 600,
                            yoyo: true,
                            repeat: -1,
                            ease: 'Sine.easeInOut'
                        });

                        // Projectile firing timer
                        scene.time.addEvent({
                            delay: 1800,
                            callback: () => {
                                if (!defender.active) return;
                                if (scavengers.getLength() > 0) {
                                    let b = scene.add.circle(x, y - 20, 6, 0x00f5ff);
                                    bullets.add(b);
                                    b.body.setVelocityY(-350); // Fast projectiles
                                }
                            },
                            loop: true
                        });
                    }
                });
            }
        }

        // Interface UI
        lightText = scene.add.text(20, 20, '✨ Light: ' + lightOrbs, { fontSize: '22px', fill: '#fffb00', fontWeight: 'bold' });
        scene.add.text(20, 50, 'Click grid to place Seahorse (Cost: 50)', { fontSize: '12px', fill: '#8fa0ba' });

        // Energy Spawning Engine
        scene.time.addEvent({
            delay: 4000,
            callback: () => {
                let rx = Phaser.Math.Between(40, 410);
                let ry = Phaser.Math.Between(100, 600);
                let orb = scene.add.circle(rx, ry, 15, 0xfffb00).setInteractive();
                
                scene.tweens.add({
                    targets: orb,
                    alpha: 0.4,
                    scale: 1.3,
                    duration: 800,
                    yoyo: true,
                    repeat: -1
                });

                orb.on('pointerdown', () => {
                    lightOrbs += 25;
                    lightText.setText('✨ Light: ' + lightOrbs);
                    orb.destroy();
                });
            },
            loop: true
        });

        // Optimized Enemy Spawning Engine
        scene.time.addEvent({
            delay: 3500,
            callback: () => {
                let randomLane = Phaser.Math.Between(0, 4);
                let enemyX = startX + (randomLane * cellWidth);
                
                // Directly turning text entity into a physical object
                let enemy = scene.add.text(enemyX, 50, '🦀', { fontSize: '28px' }).setOrigin(0.5);
                scavengers.add(enemy);
                enemy.body.setVelocityY(45); // Constant smooth descent speed
            },
            loop: true
        });

        // Combat Collision Physics
        scene.physics.add.overlap(bullets, scavengers, (bullet, enemy) => {
            bullet.destroy();
            enemy.destroy();
        });
    }

    function update() {
        // Immediate Bullet Cleanup
        bullets.getChildren().forEach(b => {
            if (b && b.y < 0) b.destroy();
        });

        // Breach Defeat Verification
        scavengers.getChildren().forEach(e => {
            if (e && e.y > 670) {
                e.destroy();
                alert('The Scavengers breached the Reef! Try again.');
                location.reload();
            }
        });
    }
</script>

</body>
</html>
